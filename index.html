<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="assets/faviconicon.png" type="image/x-icon">
</head>

<body>
  <div class="container">
    <h1>Password Generator</h1>

    <div class="display-container">
      <input class="display" readonly placeholder="Password" data-passwordDisplay>
      <button data-copy>
        <span data-copyMsg></span>
        <img src="assets/copy.svg" alt="Copy Password" width="23" height="23">
      </button>
    </div>

    <div class="input-container">

      <!-- Password Length Section -->
      <div class="length-container">
        <p>Password Length</p>
        <p data-lengthNumber>0</p>
      </div>

      <!-- Slider -->
      <input type="range" min="1" max="20" class="slider" step="1" data-lengthSlider>

      <!-- Checkboxes -->
      <div class="">
        <input type="checkbox" id="uppercase">
        <label for="uppercase">Include Uppercase Letters</label>
      </div>

      <div class="">
        <input type="checkbox" id="lowercase">
        <label for="lowercase">Include Lowercase Letters</label>
      </div>
      <div class="">
        <input type="checkbox" id="numbers">
        <label for="numbers">Include Numbers</label>
      </div>
      <div class="">
        <input type="checkbox" id="symbols">
        <label for="symbols">Include Symbols</label>
      </div>

      <!-- Strength Section -->
      <div class="strength-container">
        <p>Strength</p>
        <div data-indicator></div>
      </div>

      <!-- Generator Password -->
      <button class="generateBtn">Generate Password</button>
    </div>

  </div>
  <script src="js/app.js"></script>
</body>

</html>
